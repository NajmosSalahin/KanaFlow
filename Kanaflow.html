/* ===== BASE ===== */
body{
  background:var(--bg);color:var(--t1);
  font-family:'Figtree',sans-serif;
  min-height:100vh;display:flex;flex-direction:column;align-items:center;
  padding:2.2rem 1.375rem 3.3rem;
  font-size:110%;
}
.site-title{
  font-family:'JetBrains Mono',monospace;
  font-weight:500;font-size:12px;letter-spacing:0.35em;
  text-transform:uppercase;color:var(--t1);
  margin-bottom:1.75rem;align-self:flex-start;
}
.main-layout{
  display:flex;gap:1.25rem;width:100%;max-width:920px;align-items:flex-start;
}

/* ===== QUIZ ===== */
.quiz-card{
  flex:1;min-width:0;
  background:var(--bg2);border:1px solid var(--b1);border-radius:16px;
  padding:1.75rem;position:relative;overflow:hidden;
}
.quiz-card::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse at 50% 0%,var(--ac-g) 0%,transparent 55%);
  pointer-events:none;
}

.stats-row{display:flex;align-items:center;gap:0.6rem;margin-bottom:1.5rem;}
.stat-chip{
  font-family:'JetBrains Mono',monospace;font-size:12px;
  color:var(--t2);background:var(--bg3);border:1px solid var(--b1);
  border-radius:6px;padding:3px 9px;white-space:nowrap;
}
.stat-chip span{color:var(--t1);font-weight:500;}
.acc-wrap{flex:1;height:3px;background:var(--bg4);border-radius:2px;overflow:hidden;}
.acc-fill{height:100%;background:var(--ac);border-radius:2px;width:0%;transition:width 0.5s ease;}
.streak{
  display:flex;align-items:center;gap:5px;
  font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:500;
  padding:3px 9px;border-radius:6px;
  background:var(--bg3);border:1px solid var(--b1);
  color:var(--t2);transition:all 0.3s;white-space:nowrap;
}
.streak.hot{background:var(--ac-d);border-color:var(--ac);color:var(--ac);}
.s-dot{width:6px;height:6px;border-radius:50%;background:var(--t3);transition:background 0.3s;}
.streak.hot .s-dot{background:var(--ac);}

/* kana display */
.kana-area{display:flex;flex-direction:column;align-items:center;padding:1.5rem 0 0.75rem;}
.type-label{
  font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:500;
  letter-spacing:0.2em;text-transform:uppercase;color:var(--t2);margin-bottom:1.1rem;
}
.kana-char{
  font-size:clamp(4.5rem,13vw,6.5rem);line-height:1;
  color:var(--t1);cursor:default;user-select:none;
  font-weight:400;transition:color 0.15s;
}
.kana-char.in{animation:kIn 0.22s ease forwards;}
@keyframes kIn{from{opacity:0;transform:translateY(7px) scale(0.93);}to{opacity:1;transform:none;}}
.kana-char.shake{animation:shk 0.3s ease;}
@keyframes shk{0%,100%{transform:none;}25%{transform:translateX(-7px);}75%{transform:translateX(7px);}}
.kana-char.cflash{animation:cf 0.28s ease;}
@keyframes cf{0%,100%{color:var(--t1);}50%{color:var(--gr);}}

.reveal{
  height:18px;margin-top:0.9rem;
  font-family:'JetBrains Mono',monospace;font-size:13px;
  color:var(--ac);letter-spacing:0.1em;
  opacity:0;transition:opacity 0.18s;pointer-events:none;
}
.reveal.show{opacity:1;}

.kana-btns{display:flex;gap:5px;margin-top:0.7rem;}
.kbtn{
  font-family:'JetBrains Mono',monospace;font-size:11px;
  padding:4px 10px;border-radius:5px;
  border:1px solid var(--b2);background:transparent;
  color:var(--t3);cursor:pointer;transition:all 0.14s;
}
.kbtn:hover{background:var(--bg3);color:var(--t2);}
.kbtn:active{transform:scale(0.96);}
.sound-btn{color:var(--ac);border-color:var(--ac-d);}
.sound-btn:hover{background:var(--ac-d);}
.sound-btn.pulse{animation:sp 0.45s ease;}
@keyframes sp{0%,100%{opacity:1;}50%{opacity:0.45;}}

/* input */
.input-area{margin-top:1.1rem;}
.input-wrap{position:relative;display:flex;align-items:center;}
#inp{
  width:100%;background:var(--bg3);
  border:1px solid var(--b2);border-radius:10px;
  padding:0.82rem 2.5rem 0.82rem 1.1rem;
  font-family:'JetBrains Mono',monospace;font-size:1.05rem;
  color:var(--t1);outline:none;
  transition:border-color 0.18s,box-shadow 0.18s;
  letter-spacing:0.05em;caret-color:var(--ac);
}
#inp::placeholder{color:var(--t3);}
#inp:focus{border-color:var(--ac-d);box-shadow:0 0 0 3px var(--ac-g);}
#inp.ok{border-color:var(--gr-d);box-shadow:0 0 0 3px rgba(76,175,125,0.05);}
#inp.no{border-color:var(--rd-d);box-shadow:0 0 0 3px rgba(224,92,92,0.05);}
.ent-hint{
  position:absolute;right:11px;
  font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--t3);pointer-events:none;
}
kbd{
  font-family:'JetBrains Mono',monospace;font-size:9px;
  background:var(--bg4);border:1px solid var(--b2);
  border-radius:3px;padding:1px 4px;color:var(--t3);
}
.cf-row{
  display:flex;justify-content:center;gap:2px;
  margin-top:0.55rem;min-height:17px;
  font-family:'JetBrains Mono',monospace;font-size:0.8rem;letter-spacing:0.15em;
}
.c-ok{color:var(--gr);}.c-no{color:var(--rd);text-decoration:underline;}

.msg{
  text-align:center;margin-top:0.8rem;
  font-family:'JetBrains Mono',monospace;font-size:12px;
  min-height:19px;color:var(--t2);
}
.msg.err{color:var(--rd);}
.msg .ans{font-weight:600;color:var(--ac);}

.act-row{display:flex;justify-content:center;gap:0.5rem;margin-top:1.1rem;}
.btn{
  font-family:'Figtree',sans-serif;font-size:13px;font-weight:500;
  padding:7px 15px;border-radius:8px;
  border:1px solid var(--b2);background:transparent;
  color:var(--t2);cursor:pointer;transition:all 0.14s;
}
.btn:hover{background:var(--bg3);color:var(--t1);}
.btn:active{transform:scale(0.97);}
.btn-rev{color:var(--ac);border-color:var(--ac-d);}
.btn-rev:hover{background:var(--ac-d);}
.btn-skip{color:var(--rd);border-color:var(--rd-d);background:var(--rd-d);}
.btn-skip:hover{opacity:0.82;}

/* ===== OPTIONS ===== */
.opt-panel{width:295px;flex-shrink:0;}
.opt-toggle{
  width:100%;background:var(--bg2);border:1px solid var(--b1);
  border-radius:10px;padding:0.62rem 1rem;
  font-family:'Figtree',sans-serif;font-size:13px;font-weight:500;
  color:var(--t2);cursor:pointer;
  display:flex;align-items:center;justify-content:space-between;
  transition:all 0.14s;margin-bottom:0.5rem;
}
.opt-toggle:hover{background:var(--bg3);color:var(--t1);}
.chev{transition:transform 0.2s;font-size:10px;color:var(--t3);}
.opt-toggle.open .chev{transform:rotate(180deg);}
.opt-body{background:var(--bg2);border:1px solid var(--b1);border-radius:12px;overflow:hidden;display:none;}
.opt-body.open{display:block;}

/* theme strip */
.ts{padding:0.8rem 1rem;border-bottom:1px solid var(--b1);}
.sec-ttl{
  font-family:'JetBrains Mono',monospace;font-size:11px;
  letter-spacing:0.2em;text-transform:uppercase;color:var(--t1);
  font-weight:500;margin-bottom:0.55rem;
}
.tgrid{display:flex;flex-wrap:wrap;gap:4px;}
.tchip{
  display:flex;align-items:center;gap:5px;
  padding:4px 8px;border-radius:5px;
  border:1px solid var(--b1);background:var(--bg3);
  cursor:pointer;transition:all 0.14s;
  font-size:11px;color:var(--t2);font-family:'Figtree',sans-serif;white-space:nowrap;
}
.tchip:hover{border-color:var(--b2);color:var(--t1);background:var(--bg4);}
.tchip.active{border-color:var(--ac);color:var(--t1);background:var(--ac-d);}
.tswatch{width:8px;height:8px;border-radius:50%;flex-shrink:0;}

/* font strip */
.fs{padding:0.65rem 1rem;border-bottom:1px solid var(--b1);}
.frow{display:flex;gap:4px;flex-wrap:wrap;align-items:center;}
.fchip{
  padding:4px 9px;border-radius:5px;border:1px solid var(--b1);background:var(--bg3);
  cursor:pointer;transition:all 0.14s;font-size:12px;color:var(--t1);font-weight:500;
  display:flex;align-items:center;gap:5px;
}
.fchip:hover{border-color:var(--b2);color:var(--t1);}
.fchip.active{border-color:var(--ac);color:var(--ac);background:var(--ac-d);}
.fjp{font-size:15px;line-height:1;}

/* kana sections */
.ksec{padding:0.8rem 1rem;border-bottom:1px solid var(--b1);}
.ksec:last-child{border-bottom:none;}
.sec-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:0.5rem;}
.clinks{display:flex;gap:0.45rem;}
.clink{
  font-size:11px;cursor:pointer;opacity:0.7;transition:opacity 0.14s;
  background:none;border:none;font-family:'Figtree',sans-serif;padding:0;
}
.clink:hover{opacity:1;}
.clink-on{color:var(--ac);}
.clink-off{color:var(--t3);}
.clink-off:hover{color:var(--t2);}

.kgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(42px,1fr));gap:3px;}
.kopt{position:relative;}
.kopt input{position:absolute;opacity:0;width:0;height:0;}
.klbl{
  display:flex;flex-direction:column;align-items:center;
  padding:5px 3px;border-radius:6px;
  border:1px solid var(--b1);background:var(--bg3);
  cursor:pointer;transition:all 0.14s;width:100%;gap:1px;
}
.kopt input:checked+.klbl{background:var(--ac-d);border-color:var(--ac);}
.klbl:hover{border-color:var(--b2);background:var(--bg4);}
.kjp{font-family:'Noto Sans JP',sans-serif;font-size:14px;color:var(--t1);line-height:1;}
.krm{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--t2);font-weight:500;line-height:1;}

/* keyboard help */
.kbhelp{
  padding:0.7rem 1rem;font-size:11px;color:var(--t3);
  display:flex;flex-direction:column;gap:4px;
  font-family:'JetBrains Mono',monospace;
}
.kbr{display:flex;align-items:center;gap:5px;}

/* tooltip */
#tt{
  position:fixed;z-index:9999;
  background:var(--bg4);border:1px solid var(--b2);
  border-radius:9px;padding:8px 11px;
  pointer-events:none;display:none;
  grid-template-columns:auto auto;gap:3px 10px;
  box-shadow:0 8px 24px rgba(0,0,0,0.45);
  min-width:60px;
}
.tt-jp{font-family:'Noto Sans JP',sans-serif;font-size:16px;color:var(--t1);line-height:1.6;text-align:right;}
.tt-rm{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--ac);line-height:1.6;align-self:center;}

@media(max-width:680px){
  .main-layout{flex-direction:column;}
  .opt-panel{width:100%;}
}
</style>
</head>
<body>
<h1 class="site-title">kanaflow</h1>
<div id="tt"></div>

<div class="main-layout">

  <!-- QUIZ -->
  <div class="quiz-card">
    <div class="stats-row">
      <div class="stat-chip"><span id="sv">0</span>/<span id="tv">0</span></div>
      <div class="acc-wrap"><div class="acc-fill" id="af"></div></div>
      <div class="streak" id="stk">
        <div class="s-dot"></div><span id="stv">0</span>
      </div>
    </div>

    <div class="kana-area">
      <div class="type-label" id="tl">hiragana</div>
      <div class="kana-char in" id="kc">あ</div>
      <div class="reveal" id="rv">—</div>
      <div class="kana-btns">
        <button class="kbtn sound-btn" id="sndbtn" onclick="playAudio()">▶ sound</button>
        <button class="kbtn" onclick="toggleReveal()">peek</button>
      </div>
    </div>

    <div class="input-area">
      <div class="input-wrap">
        <input id="inp" type="text" placeholder="type romaji…"
               autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"/>
        <span class="ent-hint"><kbd>↵</kbd></span>
      </div>
      <div class="cf-row" id="cfr"></div>
    </div>

    <div class="msg" id="msg">Hover the character to peek at its reading</div>

    <div class="act-row">
      <button class="btn btn-rev" id="rbtn" onclick="toggleReveal()">Reveal</button>
      <button class="btn btn-skip" id="skbtn" onclick="skip()" style="display:none">Skip →</button>
    </div>
  </div>

  <!-- OPTIONS -->
  <div class="opt-panel">
    <button class="opt-toggle" id="optog" onclick="toggleOpt()">
      Options <span class="chev">▾</span>
    </button>
    <div class="opt-body" id="optbody">

      <div class="ts">
        <div class="sec-ttl">Theme</div>
        <div class="tgrid" id="tgrid"></div>
      </div>

      <div class="fs">
        <div class="sec-ttl">Kana font</div>
        <div class="frow">
          <div class="fchip active" data-font="'Noto Sans JP',sans-serif" onclick="setFont(this)">
            <span class="fjp">あ</span>Sans
          </div>
          <div class="fchip" data-font="'Noto Serif JP',serif" onclick="setFont(this)">
            <span class="fjp" style="font-family:'Noto Serif JP',serif">あ</span>Serif
          </div>
          <div class="fchip" data-font="'M PLUS Rounded 1c',sans-serif" onclick="setFont(this)">
            <span class="fjp" style="font-family:'M PLUS Rounded 1c',sans-serif">あ</span>Round
          </div>
          <div class="fchip" data-font="'Zen Kaku Gothic New',sans-serif" onclick="setFont(this)">
            <span class="fjp" style="font-family:'Zen Kaku Gothic New',sans-serif">あ</span>Zen
          </div>
          <div class="fchip" data-font="'Klee One',sans-serif" onclick="setFont(this)">
            <span class="fjp" style="font-family:'Klee One',sans-serif">あ</span>Klee
          </div>
        </div>
      </div>

      <div class="ksec">
        <div class="sec-hd">
          <span class="sec-ttl">Hiragana</span>
          <div class="clinks">
            <button class="clink clink-on" onclick="chk('h')">all</button>
            <button class="clink clink-off" onclick="uchk('h')">none</button>
          </div>
        </div>
        <div class="kgrid" id="hg"></div>
      </div>

      <div class="ksec">
        <div class="sec-hd">
          <span class="sec-ttl">Hiragana combos</span>
          <div class="clinks">
            <button class="clink clink-on" onclick="chk('hc')">all</button>
            <button class="clink clink-off" onclick="uchk('hc')">none</button>
          </div>
        </div>
        <div class="kgrid" id="hcg"></div>
      </div>

      <div class="ksec">
        <div class="sec-hd">
          <span class="sec-ttl">Katakana</span>
          <div class="clinks">
            <button class="clink clink-on" onclick="chk('k')">all</button>
            <button class="clink clink-off" onclick="uchk('k')">none</button>
          </div>
        </div>
        <div class="kgrid" id="kg"></div>
      </div>

      <div class="ksec">
        <div class="sec-hd">
          <span class="sec-ttl">Katakana combos</span>
          <div class="clinks">
            <button class="clink clink-on" onclick="chk('kc')">all</button>
            <button class="clink clink-off" onclick="uchk('kc')">none</button>
          </div>
        </div>
        <div class="kgrid" id="kcg"></div>
      </div>

      <div class="kbhelp">
        <div class="kbr"><kbd>Enter</kbd><kbd>Space</kbd> skip when wrong</div>
        <div class="kbr"><kbd>P</kbd> play sound</div>
        <div class="kbr"><kbd>?</kbd> peek / reveal</div>
        <div class="kbr"><kbd>Esc</kbd> skip when wrong</div>
      </div>
    </div>
  </div>
</div>

<script>
const KD={
  h:{
    hsingle:{l:'あ a',  c:{'あ':'a','い':'i','う':'u','え':'e','お':'o'}},
    hk:     {l:'か ka', c:{'か':'ka','き':'ki','く':'ku','け':'ke','こ':'ko'}},
    hs:     {l:'さ sa', c:{'さ':'sa','し':'shi','す':'su','せ':'se','そ':'so'}},
    ht:     {l:'た ta', c:{'た':'ta','ち':'chi','つ':'tsu','て':'te','と':'to'}},
    hn:     {l:'な na', c:{'な':'na','に':'ni','ぬ':'nu','ね':'ne','の':'no'}},
    hh:     {l:'は ha', c:{'は':'ha','ひ':'hi','ふ':'fu','へ':'he','ほ':'ho'}},
    hm:     {l:'ま ma', c:{'ま':'ma','み':'mi','む':'mu','め':'me','も':'mo'}},
    hy:     {l:'や ya', c:{'や':'ya','ゆ':'yu','よ':'yo'}},
    hr:     {l:'ら ra', c:{'ら':'ra','り':'ri','る':'ru','れ':'re','ろ':'ro'}},
    hw:     {l:'わ wa', c:{'わ':'wa','を':'o'}},
    hn1:    {l:'ん n',  c:{'ん':'n'}},
    hg:     {l:'が ga', c:{'が':'ga','ぎ':'gi','ぐ':'gu','げ':'ge','ご':'go'}},
    hz:     {l:'ざ za', c:{'ざ':'za','じ':'ji','ず':'zu','ぜ':'ze','ぞ':'zo'}},
    hd:     {l:'だ da', c:{'だ':'da','ぢ':'ji','づ':'zu','で':'de','ど':'do'}},
    hb:     {l:'ば ba', c:{'ば':'ba','び':'bi','ぶ':'bu','べ':'be','ぼ':'bo'}},
    hp:     {l:'ぱ pa', c:{'ぱ':'pa','ぴ':'pi','ぷ':'pu','ぺ':'pe','ぽ':'po'}},
  },
  hc:{
    hdk: {l:'きゃ kya',c:{'きゃ':'kya','きゅ':'kyu','きょ':'kyo'}},
    hds: {l:'しゃ sha',c:{'しゃ':'sha','しゅ':'shu','しょ':'sho'}},
    hdc: {l:'ちゃ cha',c:{'ちゃ':'cha','ちゅ':'chu','ちょ':'cho'}},
    hdn: {l:'にゃ nya',c:{'にゃ':'nya','にゅ':'nyu','にょ':'nyo'}},
    hdh: {l:'ひゃ hya',c:{'ひゃ':'hya','ひゅ':'hyu','ひょ':'hyo'}},
    hdm: {l:'みゃ mya',c:{'みゃ':'mya','みゅ':'myu','みょ':'myo'}},
    hdr: {l:'りゃ rya',c:{'りゃ':'rya','りゅ':'ryu','りょ':'ryo'}},
    hdg: {l:'ぎゃ gya',c:{'ぎゃ':'gya','ぎゅ':'gyu','ぎょ':'gyo'}},
    hdj: {l:'じゃ ja', c:{'じゃ':'ja','じゅ':'ju','じょ':'jo'}},
    hdj2:{l:'ぢゃ ja', c:{'ぢゃ':'ja','ぢゅ':'ju','ぢょ':'jo'}},
    hdb: {l:'びゃ bya',c:{'びゃ':'bya','びゅ':'byu','びょ':'byo'}},
    hdp: {l:'ぴゃ pya',c:{'ぴゃ':'pya','ぴゅ':'pyu','ぴょ':'pyo'}},
  },
  k:{
    ksingle:{l:'ア a',  c:{'ア':'a','イ':'i','ウ':'u','エ':'e','オ':'o'}},
    kk:     {l:'カ ka', c:{'カ':'ka','キ':'ki','ク':'ku','ケ':'ke','コ':'ko'}},
    ks:     {l:'サ sa', c:{'サ':'sa','シ':'shi','ス':'su','セ':'se','ソ':'so'}},
    kt:     {l:'タ ta', c:{'タ':'ta','チ':'chi','ツ':'tsu','テ':'te','ト':'to'}},
    kn:     {l:'ナ na', c:{'ナ':'na','ニ':'ni','ヌ':'nu','ネ':'ne','ノ':'no'}},
    kh:     {l:'ハ ha', c:{'ハ':'ha','ヒ':'hi','フ':'fu','ヘ':'he','ホ':'ho'}},
    km:     {l:'マ ma', c:{'マ':'ma','ミ':'mi','ム':'mu','メ':'me','モ':'mo'}},
    ky:     {l:'ヤ ya', c:{'ヤ':'ya','ユ':'yu','ヨ':'yo'}},
    kr:     {l:'ラ ra', c:{'ラ':'ra','リ':'ri','ル':'ru','レ':'re','ロ':'ro'}},
    kw:     {l:'ワ wa', c:{'ワ':'wa','ヲ':'o'}},
    kn1:    {l:'ン n',  c:{'ン':'n'}},
    kg:     {l:'ガ ga', c:{'ガ':'ga','ギ':'gi','グ':'gu','ゲ':'ge','ゴ':'go'}},
    kz:     {l:'ザ za', c:{'ザ':'za','ジ':'ji','ズ':'zu','ゼ':'ze','ゾ':'zo'}},
    kd:     {l:'ダ da', c:{'ダ':'da','ヂ':'ji','ヅ':'zu','デ':'de','ド':'do'}},
    kb:     {l:'バ ba', c:{'バ':'ba','ビ':'bi','ブ':'bu','ベ':'be','ボ':'bo'}},
    kp:     {l:'パ pa', c:{'パ':'pa','ピ':'pi','プ':'pu','ペ':'pe','ポ':'po'}},
  },
  kc:{
    kdk: {l:'キャ kya',c:{'キャ':'kya','キュ':'kyu','キョ':'kyo'}},
    kds: {l:'シャ sha',c:{'シャ':'sha','シュ':'shu','ショ':'sho'}},
    kdc: {l:'チャ cha',c:{'チャ':'cha','チュ':'chu','チョ':'cho'}},
    kdn: {l:'ニャ nya',c:{'ニャ':'nya','ニュ':'nyu','ニョ':'nyo'}},
    kdh: {l:'ヒャ hya',c:{'ヒャ':'hya','ヒュ':'hyu','ヒョ':'hyo'}},
    kdm: {l:'ミャ mya',c:{'ミャ':'mya','ミュ':'myu','ミョ':'myo'}},
    kdr: {l:'リャ rya',c:{'リャ':'rya','リュ':'ryu','リョ':'ryo'}},
    kdg: {l:'ギャ gya',c:{'ギャ':'gya','ギュ':'gyu','ギョ':'gyo'}},
    kdj: {l:'ジャ ja', c:{'ジャ':'ja','ジュ':'ju','ジョ':'jo'}},
    kdj2:{l:'ヂャ ja', c:{'ヂャ':'ja','ヂュ':'ju','ヂョ':'jo'}},
    kdb: {l:'ビャ bya',c:{'ビャ':'bya','ビュ':'byu','ビョ':'byo'}},
    kdp: {l:'ピャ pya',c:{'ピャ':'pya','ピュ':'pyu','ピョ':'pyo'}},
  }
};

const REP={'o':['wo'],'chi':['ci'],'shi':['si'],'tsu':['tu'],'zu':['du'],'ji':['di','zi'],'fu':['hu'],'ja':['dya'],'jo':['dyo'],'ju':['dyu']};
const GL={h:'hiragana',hc:'hiragana combo',k:'katakana',kc:'katakana combo'};

/* === THEMES === */
const THEMES=[
  {id:'night',      name:'Night',       hex:'#f0a500'},
  {id:'catppuccin', name:'Catppuccin',  hex:'#cba6f7'},
  {id:'gruvbox',    name:'Gruvbox',     hex:'#fabd2f'},
  {id:'coral',      name:'Coral',       hex:'#ff7f6e'},
  {id:'forest',     name:'Forest',      hex:'#80c970'},
  {id:'nord',       name:'Nord',        hex:'#88c0d0'},
  {id:'tokyo-night',name:'Tokyo Night', hex:'#7aa2f7'},
  {id:'dracula',    name:'Dracula',     hex:'#ff79c6'},
  {id:'one-dark',   name:'One Dark',    hex:'#61afef'},
  {id:'solarized',  name:'Solarized',   hex:'#268bd2'},
  {id:'monokai',    name:'Monokai',     hex:'#e6db74'},
  {id:'rose-pine',  name:'Rose Piné',   hex:'#f6c177'},
  {id:'kanagawa',   name:'Kanagawa',    hex:'#7fb4ca'},
  {id:'everforest', name:'Everforest',  hex:'#a7c080'},
  {id:'cyberpunk',  name:'Cyberpunk',   hex:'#ffff00'},
  {id:'material',   name:'Material',    hex:'#80cbc4'},
  {id:'ayu',        name:'Ayu',         hex:'#ffb454'},
  {id:'astral',     name:'Astral',      hex:'#4db8ff'},
  {id:'midnight',   name:'Midnight',    hex:'#9896ff'},
  {id:'eclipse',    name:'Eclipse',     hex:'#bb86fc'},
  {id:'nebula',     name:'Nebula',      hex:'#d180ff'},
  {id:'obsidian',   name:'Obsidian',    hex:'#6db3f2'},
];

function buildThemes(){
  const g=document.getElementById('tgrid');
  const cur=document.documentElement.dataset.theme||'night';
  THEMES.forEach(t=>{
    const c=document.createElement('button');
    c.className='tchip'+(t.id===cur?' active':'');
    c.dataset.id=t.id;
    c.innerHTML=`<span class="tswatch" style="background:${t.hex}"></span>${t.name}`;
    c.onclick=()=>applyTheme(t.id);
    g.appendChild(c);
  });
}
function applyTheme(id){
  document.documentElement.dataset.theme=id;
  localStorage.setItem('ks_theme',id);
  document.querySelectorAll('.tchip').forEach(c=>c.classList.toggle('active',c.dataset.id===id));
}

/* === FONT === */
function setFont(el){
  const f=el.dataset.font;
  document.getElementById('kc').style.fontFamily=f;
  localStorage.setItem('ks_font',f);
  localStorage.setItem('ks_font_el',el.querySelector('.fjp').textContent.trim());
  document.querySelectorAll('.fchip').forEach(c=>c.classList.remove('active'));
  el.classList.add('active');
}

/* === TOOLTIP === */
const tt=document.getElementById('tt');
let tth=null;
function showTT(el,chars){
  clearTimeout(tth);
  tt.innerHTML=Object.entries(chars).map(([ch,rm])=>`<span class="tt-jp">${ch}</span><span class="tt-rm">${rm}</span>`).join('');
  tt.style.display='grid';
  const r=el.getBoundingClientRect(),tw=tt.offsetWidth||100,th2=tt.offsetHeight||60;
  let l=r.left+r.width/2-tw/2, t=r.top-th2-8;
  if(l<6)l=6; if(l+tw>window.innerWidth-6)l=window.innerWidth-tw-6;
  if(t<6)t=r.bottom+8;
  if(t+th2>window.innerHeight-6)t=window.innerHeight-th2-6;
  tt.style.left=l+'px'; tt.style.top=t+'px';
}
function hideTT(){tth=setTimeout(()=>tt.style.display='none',80);}

/* === BUILD GRIDS === */
function buildGrid(grp,gid){
  const g=document.getElementById(gid); g.innerHTML='';
  Object.entries(KD[grp]).forEach(([id,{l,c}])=>{
    const[jp,rm]=l.split(' ');
    const w=document.createElement('div'); w.className='kopt';
    const inp=document.createElement('input');
    inp.type='checkbox'; inp.id=id; inp.dataset.g=grp;
    inp.addEventListener('change',()=>{save();rebuildPool();});
    const lbl=document.createElement('label');
    lbl.htmlFor=id; lbl.className='klbl';
    lbl.innerHTML=`<span class="kjp">${jp}</span><span class="krm">${rm}</span>`;
    lbl.addEventListener('mouseenter',()=>showTT(lbl,c));
    lbl.addEventListener('mouseleave',hideTT);
    w.appendChild(inp); w.appendChild(lbl); g.appendChild(w);
  });
}
buildGrid('h','hg'); buildGrid('hc','hcg'); buildGrid('k','kg'); buildGrid('kc','kcg');
buildThemes();

/* === SETTINGS === */
function chk(g){document.querySelectorAll(`input[data-g="${g}"]`).forEach(c=>c.checked=true);save();rebuildPool();}
function uchk(g){document.querySelectorAll(`input[data-g="${g}"]`).forEach(c=>c.checked=false);save();rebuildPool();}
function save(){document.querySelectorAll('input[type=checkbox]').forEach(c=>localStorage.setItem('ks2_'+c.id,c.checked?'1':'0'));}
function load(){
  let any=false;
  document.querySelectorAll('input[type=checkbox]').forEach(c=>{
    const v=localStorage.getItem('ks2_'+c.id);
    if(v!==null){c.checked=v==='1';any=true;}
  });
  if(!any)document.getElementById('hsingle').checked=true;
  applyTheme(localStorage.getItem('ks_theme')||'night');
  const sf=localStorage.getItem('ks_font');
  if(sf){
    document.getElementById('kc').style.fontFamily=sf;
    document.querySelectorAll('.fchip').forEach(c=>{
      if(c.dataset.font===sf){document.querySelectorAll('.fchip').forEach(x=>x.classList.remove('active'));c.classList.add('active');}
    });
  }
}

/* === POOL === */
let pool=[],queue=[],curCh=null,curRd=null,curGrp=null;
let totAns=0,totCor=0,streak=0,isWrong=false,revealed=false;

function buildPool(){
  pool=[];
  document.querySelectorAll('input[type=checkbox]:checked').forEach(cb=>{
    for(const[g,gd]of Object.entries(KD)){
      if(gd[cb.id])for(const[ch,rd]of Object.entries(gd[cb.id].c))pool.push({ch,rd,g});
    }
  });
  if(!pool.length){document.getElementById('hsingle').checked=true;save();buildPool();}
}
function rebuildPool(){buildPool();queue=[];}
function shuffle(a){const b=a.slice();for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}

function next(){
  if(!queue.length)queue=shuffle(pool);
  if(curCh&&queue[0]&&queue[0].ch===curCh&&queue.length>1)queue.shift();
  const it=queue.shift(); curCh=it.ch; curRd=it.rd; curGrp=it.g; render();
}

function render(){
  const el=document.getElementById('kc');
  el.classList.remove('in','shake','cflash'); void el.offsetWidth; el.classList.add('in');
  el.textContent=curCh;
  document.getElementById('tl').textContent=GL[curGrp]||'';
  hideRv(); isWrong=false; revealed=false;
  const inp=document.getElementById('inp');
  inp.value=''; inp.className=''; inp.placeholder='type romaji…'; inp.focus();
  document.getElementById('cfr').innerHTML='';
  document.getElementById('msg').textContent='Hover the character to peek at its reading';
  document.getElementById('msg').className='msg';
  document.getElementById('skbtn').style.display='none';
  document.getElementById('rbtn').style.display='';
  updateStats();
}

/* === REVEAL === */
const kcEl=document.getElementById('kc');
kcEl.addEventListener('mouseenter',showRv);
kcEl.addEventListener('mouseleave',()=>{if(!revealed)hideRv();});
kcEl.addEventListener('click',()=>{revealed=!revealed;revealed?showRv():hideRv();});
function showRv(){const r=document.getElementById('rv');r.textContent=curRd;r.classList.add('show');}
function hideRv(){document.getElementById('rv').classList.remove('show');}
function toggleReveal(){revealed=!revealed;revealed?showRv():hideRv();}

/* === AUDIO === */
let jpVoice=null;
function initVoices(){
  const vs=speechSynthesis.getVoices();
  jpVoice=vs.find(v=>v.lang==='ja-JP')||vs.find(v=>v.lang.startsWith('ja'))||null;
}
if('speechSynthesis'in window){speechSynthesis.addEventListener('voiceschanged',initVoices);initVoices();}
function playAudio(){
  if(!('speechSynthesis'in window))return;
  speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(curCh);
  u.lang='ja-JP'; u.rate=0.8; u.pitch=1;
  if(jpVoice)u.voice=jpVoice;
  speechSynthesis.speak(u);
  const b=document.getElementById('sndbtn');
  b.classList.add('pulse'); setTimeout(()=>b.classList.remove('pulse'),500);
}

/* === INPUT === */
function getPoss(rd){const p=[rd];if(REP[rd])p.push(...REP[rd]);return p;}

document.getElementById('inp').addEventListener('input',function(){
  if(isWrong)return; checkLive(this.value.toLowerCase());
});
document.getElementById('inp').addEventListener('keydown',function(e){
  if(e.key==='Enter'||(e.key===' '&&!this.value)){
    e.preventDefault(); isWrong?skip():submit(this.value.toLowerCase());
  }
  if(e.key==='?'){e.preventDefault();toggleReveal();}
  if(e.key.toLowerCase()==='p'&&!this.value){e.preventDefault();playAudio();}
});
document.addEventListener('keydown',function(e){
  const inp=document.getElementById('inp');
  if(e.key==='Escape'){if(isWrong)skip();inp.focus();return;}
  if(document.activeElement!==inp&&e.key.length===1&&!e.ctrlKey&&!e.metaKey)inp.focus();
});

function checkLive(typed){
  const poss=getPoss(curRd), cfr=document.getElementById('cfr');
  if(!typed){cfr.innerHTML='';document.getElementById('inp').className='';return;}
  let best=poss[0];
  for(const p of poss){if(p.startsWith(typed.slice(0,p.length))){best=p;break;}}
  cfr.innerHTML=typed.split('').map((tc,i)=>tc===best[i]?`<span class="c-ok">${tc}</span>`:`<span class="c-no">${tc}</span>`).join('');
  for(const p of poss){if(p===typed){submit(typed);return;}}
  document.getElementById('inp').className=poss.some(p=>p.startsWith(typed))?'':'no';
}

function submit(typed){
  const poss=getPoss(curRd), ok=poss.some(p=>p===typed);
  totAns++;
  if(ok){
    totCor++; streak++;
    const el=document.getElementById('kc'); el.classList.add('cflash');
    showRv(); updateStats(); setTimeout(next,165);
  } else {
    isWrong=true; streak=0;
    document.getElementById('kc').classList.add('shake'); showRv();
    const inp=document.getElementById('inp'); inp.className='no'; inp.value=typed;
    const msg=document.getElementById('msg');
    msg.className='msg err';
    msg.innerHTML=`${curCh} = <span class="ans">${curRd}</span> &mdash; Enter to continue`;
    document.getElementById('skbtn').style.display='';
    document.getElementById('rbtn').style.display='none';
    updateStats();
    const req={ch:curCh,rd:curRd,g:curGrp};
    if(queue.length>3)queue.splice(3,0,req); else queue.push(req);
    if(queue.length>13)queue.splice(13,0,req);
  }
}
function skip(){if(!isWrong)return;next();}

function updateStats(){
  document.getElementById('sv').textContent=totCor;
  document.getElementById('tv').textContent=totAns;
  document.getElementById('af').style.width=(totAns>0?totCor/totAns*100:0)+'%';
  document.getElementById('stv').textContent=streak;
  document.getElementById('stk').classList.toggle('hot',streak>=5);
}

function toggleOpt(){
  document.getElementById('optbody').classList.toggle('open');
  document.getElementById('optog').classList.toggle('open');
}

load(); buildPool(); next();
</script>
